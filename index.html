<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Industrial Energy Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.1/build/stlite.css" />
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.1/build/stlite.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      stlite.mount({
        // Securely pre-installs Python analytics packages directly inside the user's browser
        requirements: ["pandas", "plotly"], 
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
import plotly.graph_objects as go

# 1. Dashboard Framework Configurations
st.set_page_config(page_title="Energy Command Center", page_icon="⚡", layout="wide")

# 2. Portal Security Authentication Layer
if "authenticated" not in st.session_state:
    st.session_state["authenticated"] = False

if not st.session_state["authenticated"]:
    st.markdown("<h1 style='text-align: center; color: #a855f7; margin-top: 60px; font-weight: 800;'>🌌 ENERGY PORTAL SECURE LOCK</h1>", unsafe_allow_html=True)
    st.markdown("<p style='text-align: center; color: #94a3b8;'>Authorized personnel only. Please input the system key to load telemetry grids.</p>", unsafe_allow_html=True)
    st.write("---")
    
    _, col2, _ = st.columns([1, 1.2, 1])
    with col2:
        password = st.text_input("Operational Access Key", type="password", placeholder="••••••••")
        login_btn = st.button("Initialize Secure Dashboard Connection", use_container_width=True)
        
        if login_btn:
            if password == "secret123": # Feel free to modify this password key
                st.session_state["authenticated"] = True
                st.rerun()
            else:
                st.error("Access Denied. Passcode trace rejected.")
    st.stop()

# 3. Connected Google Sheet Telemetry Core 
# 🌟 PASTE YOUR LIVE GOOGLE SHEET CSV LINK HERE
GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0XRXf0N1pS7sFDcdT-CzjJWyBbBe1LTPWDzWr9QIxBJv1wxDTEub2LcCCk90asnP1tixT7rWpseq8/pub?gid=0&single=true&output=csv"

@st.cache_data(ttl=30) # Automatic background memory refresher triggers every 30 seconds
def fetch_energy_data():
    try:
        data = pd.read_csv(GOOGLE_SHEET_CSV_URL)
        # Parse and sort timestamps cleanly to guarantee linear trend paths
        data['timestamp'] = pd.to_datetime(data['timestamp'])
        data = data.sort_values('timestamp')
        return data
    except Exception as e:
        return pd.DataFrame()

df = fetch_energy_data()

if df.empty:
    st.info("🔄 Re-establishing handshake arrays... Please verify that your Google Sheet CSV URL link is pasted correctly on line 42.")
    st.stop()

# 4. Global Core Metrics Workspace Header
st.title("⚡ INDUSTRIAL ENERGY TELEMETRY PLATFORM")
st.caption("Active monitoring interface reading live rows directly from your unified cloud spreadsheet layer.")
st.write("---")

# 5. Sidebar Command Console Filters (Slicers)
with st.sidebar:
    st.markdown("### 🎛️ Dynamic Slicers Panel")
    
    # Filter One: Operational Subsystems / Functions
    func_options = ["All Systems"] + list(df['function'].dropna().unique())
    selected_func = st.selectbox("Select Core Infrastructure Group", func_options)
    
    # Filter Two: Physical Panel Identifiers
    panel_options = ["All Panels"] + list(df['panel_id'].dropna().unique())
    selected_panel = st.selectbox("Select Distribution Panel ID", panel_options)
    
    st.write("---")
    if st.button("Lock System Console Session", use_container_width=True):
        st.session_state["authenticated"] = False
        st.rerun()

# Apply conditional array matrices securely across selections
filtered_df = df.copy()
if selected_func != "All Systems":
    filtered_df = filtered_df[filtered_df['function'] == selected_func]
if selected_panel != "All Panels":
    filtered_df = filtered_df[filtered_df['panel_id'] == selected_panel]

if filtered_df.empty:
    st.warning("⚠️ No operational records match the specific Slicer criteria combinations selected.")
    st.stop()

# 6. Industrial KPI Summary Card Blocks
metric_col1, metric_col2, metric_col3, metric_col4 = st.columns(4)

with metric_col1:
    latest_power = filtered_df['active_power_w'].iloc[-1] if not filtered_df.empty else 0
    st.metric(label="Current Draw (Active Power)", value=f"{latest_power:,.1f} W")

with metric_col2:
    max_energy = filtered_df['total_energy_kwh'].max() - filtered_df['total_energy_kwh'].min()
    st.metric(label="Accumulated Net Intake", value=f"{max_energy:,.2f} kWh")

with metric_col3:
    avg_load_hrs = filtered_df['load_run_hours'].max() if not filtered_df.empty else 0
    st.metric(label="System Machine Load Runtime", value=f"{avg_load_hrs:,.1f} Hrs")

with metric_col4:
    active_nodes = filtered_df['function'].nunique()
    st.metric(label="Monitored Branch Nodes", value=f"{active_nodes} Channels")

st.write("---")

# 7. Cinematic Analytical Visualization Layer
chart_tab1, chart_tab2 = st.tabs(["📈 Load Profile Trends", "📊 Phase Current Balancing Ledger"])

with chart_tab1:
    st.subheader("Active Power Demands Profile ($W$) Over Time")
    # Interactive time-series line plot with Plotly dark styling template
    fig_line = px.line(
        filtered_df,
        x='timestamp',
        y='active_power_w',
        color='function',
        title="Dynamic Load Flux Cycle Metrics",
        template="plotly_dark",
        color_discrete_sequence=px.colors.qualitative.Bold
    )
    fig_line.update_layout(
        paper_bgcolor='rgba(0,0,0,0)',
        plot_bgcolor='rgba(0,0,0,0)',
        hovermode="x unified",
        transition_duration=400
    )
    st.plotly_chart(fig_line, use_container_width=True)

with chart_tab2:
    st.subheader("Three-Phase Current Amp Balance Profiles Matrix")
    
    # Calculate electrical mean current loads across phases
    avg_r = filtered_df['current_r_a'].mean()
    avg_y = filtered_df['current_y_a'].mean()
    avg_b = filtered_df['current_b_a'].mean()
    
    fig_bar = go.Figure(data=[
        go.Bar(name='Phase R (Red)', x=['Current Phases Load Vector'], y=[avg_r], marker_color='#ef4444'),
        go.Bar(name='Phase Y (Yellow)', x=['Current Phases Load Vector'], y=[avg_y], marker_color='#eab308'),
        go.Bar(name='Phase B (Blue)', x=['Current Phases Load Vector'], y=[avg_b], marker_color='#3b82f6')
    ])
    fig_bar.update_layout(
        template="plotly_dark",
        paper_bgcolor='rgba(0,0,0,0)',
        plot_bgcolor='rgba(0,0,0,0)',
        barmode='group',
        yaxis_title="Average Amperage Values (Amps)",
        transition_duration=400
    )
    st.plotly_chart(fig_bar, use_container_width=True)

st.write("---")

# 8. Lower Data Registry Ledger Explorer Table view
with st.expander("📋 Open Raw Telemetry Record Registry Ledger Explorer"):
    st.dataframe(
        filtered_df.sort_values('timestamp', ascending=False),
        use_container_width=True,
        hide_index=True
    )
`
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
