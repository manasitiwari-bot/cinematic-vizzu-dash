<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Streamlit Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.1/build/stlite.css" />
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.71.1/build/stlite.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      stlite.mount({
        // Automatically injects requirements into the browser environment
        requirements: ["pandas", "plotly"], 
        files: {
          "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px

# 1. Page Frame Config
st.set_page_config(page_title="Streamlit Metrics Engine", page_icon="⚡", layout="wide")

# 2. Secure Access Layer 
if "authenticated" not in st.session_state:
    st.session_state["authenticated"] = False

if not st.session_state["authenticated"]:
    st.markdown("<h1 style='text-align: center; color: #a855f7; margin-top: 50px;'>🌌 PORTAL SECURITY LOCK</h1>", unsafe_allow_html=True)
    st.markdown("<p style='text-align: center; color: #94a3b8;'>Enter operational credentials to open secure analytics streams.</p>", unsafe_allow_html=True)
    st.write("---")
    
    _, col2, _ = st.columns([1, 1.5, 1])
    with col2:
        password = st.text_input("Access Key", type="password", placeholder="••••••••")
        login_btn = st.button("Authorize Session", use_container_width=True)
        
        if login_btn:
            if password == "secret123": # Change your portal password here
                st.session_state["authenticated"] = True
                st.rerun()
            else:
                st.error("Invalid passcode credential. Connection refused.")
    st.stop()

# 3. Dynamic Cloud Database Link (Google Sheets API Connection)
# 🌟 PASTE YOUR PUBLIC GOOGLE SHEET CSV LINK HERE
GOOGLE_SHEET_CSV_URL = "PASTE_YOUR_PUBLIC_GOOGLE_SHEET_CSV_LINK_HERE"

@st.cache_data(ttl=30) # Background caching keeps transitions fast but updates every 30 secs
def fetch_live_records():
    try:
        return pd.read_csv(GOOGLE_SHEET_CSV_URL)
    except Exception:
        return pd.DataFrame()

df = fetch_live_records()

if df.empty:
    st.info("🔄 Initiating handshake protocols... Please verify your Google Sheet CSV URL configuration link.")
    st.stop()

# Auto-detect data layout structures safely
cols = list(df.columns)
filter_1_name = cols[0]
filter_2_name = cols[1]

# Identify first numeric column for mapping metric aggregates automatically
metric_name = next((c for c in cols if pd.api.types.is_numeric_dtype(df[c])), cols[-1])

# 4. Streamlit Dashboard Shell
st.title("📊 OPERATIONAL CONTROL LEDGER")
st.caption("Live streaming connection established. Changes made on Google Sheets reflect automatically here.")
st.write("---")

# Left Command Panel Sidebar Layout
with st.sidebar:
    st.markdown("### 🎛️ Data Slicers")
    
    # Filter One
    opt_1 = ["All"] + list(df[filter_1_name].dropna().unique())
    select_1 = st.selectbox(f"Filter by {filter_1_name}", opt_1)
    
    # Filter Two
    opt_2 = ["All"] + list(df[filter_2_name].dropna().unique())
    select_2 = st.selectbox(f"Filter by {filter_2_name}", opt_2)
    
    st.write("---")
    if st.button("Terminate Session / Lock", use_container_width=True):
        st.session_state["authenticated"] = False
        st.rerun()

# Apply array masks against dynamic filters
filtered_df = df.copy()
if select_1 != "All":
    filtered_df = filtered_df[filtered_df[filter_1_name] == select_1]
if select_2 != "All":
    filtered_df = filtered_df[filtered_df[filter_2_name] == select_2]

# 5. Render Metric Visualizations Content Panels
chart_col, matrix_col = st.columns([2.2, 1])

with chart_col:
    st.subheader("📈 Interactive Movement Trends")
    if not filtered_df.empty:
        # Render a gorgeous, animated Plotly chart
        fig = px.bar(
            filtered_df,
            x=filter_2_name,
            y=metric_name,
            color=filter_1_name,
            barmode="group",
            template="plotly_dark",
            color_discrete_sequence=px.colors.qualitative.Pastel
        )
        
        # Transparent canvas background settings with entry slide transitions
        fig.update_layout(
            paper_bgcolor='rgba(0,0,0,0)',
            plot_bgcolor='rgba(0,0,0,0)',
            transition_duration=400, # Smoothly glides bars when filters are adjusted
            legend=dict(orientation="h", yanchor="bottom", y=1.02, xanchor="right", x=1)
        )
        st.plotly_chart(fig, use_container_width=True)
    else:
        st.warning("No structural database blocks align with active filters configuration.")

with matrix_col:
    st.subheader("📋 Ledger Registry Rows")
    st.dataframe(
        filtered_df, 
        use_container_width=True, 
        hide_index=True
    )
`
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
